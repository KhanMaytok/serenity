<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seren</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #e8e8e0;
      --muted: #4a4a44;
      --accent: #c8b89a;
      --accent-dim: #7a6e5a;
      --danger: #8b3a3a;
      --seren: #1a1a1a;
      --seren-border: #2a2520;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.6;
    }

    /* Header */
    .header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3a5a3a;
      box-shadow: 0 0 8px #3a5a3a;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .memory-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 6px 12px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .memory-btn:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    /* Chat area */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
    }

    .chat-container::-webkit-scrollbar { width: 3px; }
    .chat-container::-webkit-scrollbar-track { background: transparent; }
    .chat-container::-webkit-scrollbar-thumb { background: var(--border); }

    /* Messages */
    .message {
      display: flex;
      gap: 16px;
      padding: 20px 0;
      border-bottom: 1px solid #131313;
      animation: fadeIn 0.3s ease;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-role {
      font-family: 'Syne', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      min-width: 70px;
      padding-top: 2px;
      flex-shrink: 0;
    }

    .message.user .message-role { color: var(--muted); }
    .message.assistant .message-role { color: var(--accent); }

    .message-content {
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--text);
      font-weight: 300;
      flex: 1;
    }

    .message.user .message-content {
      color: #8a8a80;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 16px;
      padding: 20px 0;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    .typing-role {
      font-family: 'Syne', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      min-width: 70px;
      padding-top: 2px;
    }

    .typing-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding-top: 4px;
    }

    .typing-dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent-dim);
      animation: blink 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 40px;
      max-width: 500px;
      margin: 0 auto;
    }

    .welcome-symbol {
      font-family: 'Syne', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .welcome-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .welcome-desc {
      font-size: 0.8rem;
      color: #3a3a36;
      line-height: 1.8;
      font-weight: 300;
      margin-top: 8px;
    }

    /* Input area */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 20px 32px;
      flex-shrink: 0;
    }

    .input-wrapper {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-field {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      padding: 14px 18px;
      resize: none;
      outline: none;
      line-height: 1.6;
      min-height: 50px;
      max-height: 150px;
      transition: border-color 0.2s;
      font-weight: 300;
    }

    .input-field:focus {
      border-color: var(--accent-dim);
    }

    .input-field::placeholder {
      color: var(--muted);
    }

    .send-btn {
      background: var(--accent);
      border: none;
      color: #0a0a0a;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 14px 20px;
      cursor: pointer;
      transition: all 0.2s;
      height: 50px;
      min-width: 80px;
    }

    .send-btn:hover {
      background: #e0d0b8;
    }

    .send-btn:disabled {
      background: var(--muted);
      cursor: not-allowed;
    }

    .input-meta {
      max-width: 800px;
      margin: 8px auto 0;
      font-size: 0.6rem;
      color: #2a2a26;
      letter-spacing: 0.1em;
    }

    /* Memory panel */
    .memory-panel {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 340px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 24px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .memory-panel.open {
      transform: translateX(0);
    }

    .memory-panel h3 {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .memory-item {
      padding: 12px 0;
      border-bottom: 1px solid #161616;
    }

    .memory-tag {
      display: inline-block;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 2px 6px;
      border: 1px solid;
      margin-bottom: 6px;
    }

    .memory-tag.commitment { color: #8b6a3a; border-color: #4a3a1a; }
    .memory-tag.goal { color: #3a6a5a; border-color: #1a3a2a; }
    .memory-tag.pattern { color: #6a3a5a; border-color: #3a1a3a; }
    .memory-tag.excuse { color: #8b3a3a; border-color: #4a1a1a; }
    .memory-tag.achievement { color: #5a8b3a; border-color: #2a4a1a; }
    .memory-tag.context { color: var(--muted); border-color: var(--border); }

    .memory-text {
      font-size: 0.75rem;
      line-height: 1.6;
      color: #6a6a60;
      font-weight: 300;
    }

    .memory-importance {
      display: flex;
      gap: 2px;
      margin-top: 4px;
    }

    .imp-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--border);
    }

    .imp-dot.active { background: var(--accent-dim); }

    .no-memories {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      padding: 40px 0;
      font-style: italic;
    }

    .close-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* Memory indicator */
    .memory-indicator {
      font-size: 0.6rem;
      color: var(--accent-dim);
      letter-spacing: 0.1em;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border: 1px solid #2a2520;
      margin-top: 6px;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo">Seren</div>
    <div class="status">
      <div class="status-dot"></div>
      <span>Activo</span>
    </div>
    <button class="memory-btn" onclick="toggleMemory()">Memoria</button>
  </header>

  <div class="chat-container" id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-symbol">S</div>
      <div class="welcome-title">Mentor de alto rendimiento</div>
      <div class="welcome-desc">
        No estoy aquí para hacerte sentir bien.<br>
        Estoy aquí para que actúes.
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        class="input-field"
        id="messageInput"
        placeholder="Escribe aquí..."
        rows="1"
        onkeydown="handleKeyDown(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Enviar</button>
    </div>
    <div class="input-meta">Enter para enviar · Shift+Enter nueva línea</div>
  </div>

  <!-- Memory Panel -->
  <div class="memory-panel" id="memoryPanel">
    <button class="close-panel" onclick="toggleMemory()">×</button>
    <h3>Memoria de Seren</h3>
    <div id="memoriesList">
      <div class="no-memories">Aún no hay memorias acumuladas</div>
    </div>
  </div>

  <script>
    // State
    let userId = localStorage.getItem('seren_user_id') || null;
    let sessionId = null;
    let isLoading = false;
    let memoryOpen = false;

    function generateId() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }

    // Init session
    function initSession() {
      if (!userId) {
        userId = generateId();
        localStorage.setItem('seren_user_id', userId);
      }
      sessionId = generateId();
    }

    initSession();

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 150) + 'px';
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function hideWelcome() {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();
    }

    function appendMessage(role, content, memoryUsed = false) {
      hideWelcome();
      const chat = document.getElementById('chat');

      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const roleLabel = role === 'user' ? 'Tú' : 'Seren';

      let memoryTag = '';
      if (role === 'assistant' && memoryUsed) {
        memoryTag = '<div class="memory-indicator">⟡ memoria activa</div>';
      }

      msg.innerHTML = `
        <div class="message-role">${roleLabel}</div>
        <div>
          <div class="message-content">${escapeHtml(content)}</div>
          ${memoryTag}
        </div>
      `;

      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      hideWelcome();
      const chat = document.getElementById('chat');
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.id = 'typing';
      typing.innerHTML = `
        <div class="typing-role">Seren</div>
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      `;
      chat.appendChild(typing);
      chat.scrollTop = chat.scrollHeight;
    }

    function hideTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    async function sendMessage() {
      if (isLoading) return;

      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;

      input.value = '';
      input.style.height = 'auto';
      isLoading = true;

      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;

      appendMessage('user', message);
      showTyping();

      try {
        const res = await fetch('/api/chat/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: userId,
            session_id: sessionId,
            message: message
          })
        });

        const data = await res.json();
        hideTyping();

        if (data.error) {
          appendMessage('assistant', `[Error: ${data.error}]`);
        } else {
          appendMessage('assistant', data.response, data.memory_used);
        }

      } catch (err) {
        hideTyping();
        appendMessage('assistant', '[Error de conexión. Verifica el servidor.]');
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    async function toggleMemory() {
      const panel = document.getElementById('memoryPanel');
      memoryOpen = !memoryOpen;

      if (memoryOpen) {
        panel.classList.add('open');
        await loadMemories();
      } else {
        panel.classList.remove('open');
      }
    }

    async function loadMemories() {
      const list = document.getElementById('memoriesList');
      list.innerHTML = '<div class="no-memories">Cargando...</div>';

      try {
        const res = await fetch(`/api/memories/${userId}/`);
        const data = await res.json();

        if (!data.memories || data.memories.length === 0) {
          list.innerHTML = '<div class="no-memories">Sin memorias aún.<br>Seren aprende con el tiempo.</div>';
          return;
        }

        list.innerHTML = data.memories.map(m => {
          const dots = Array.from({length: 5}, (_, i) =>
            `<div class="imp-dot ${i < m.importance ? 'active' : ''}"></div>`
          ).join('');

          return `
            <div class="memory-item">
              <span class="memory-tag ${m.memory_type}">${m.memory_type}</span>
              <div class="memory-text">${escapeHtml(m.content)}</div>
              <div class="memory-importance">${dots}</div>
            </div>
          `;
        }).join('');

      } catch (err) {
        list.innerHTML = '<div class="no-memories">Error cargando memorias.</div>';
      }
    }
  </script>
</body>
</html>
